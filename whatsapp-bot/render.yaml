# render.yaml — Configuración de deploy en Render
services:
  - type: web
    name: tancat-whatsapp-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
